name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read


jobs:
  # -------------------------------------------------------------------
  # Lint (ruff format + ruff check) — fast, runs in parallel with typecheck
  # -------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        python-version: "3.14"
        activate-environment: true
        enable-cache: "true"
        cache-dependency-glob: "pyproject.toml"
        cache-suffix: ${{ github.job }}
    - name: Install dependencies
      run: uv pip install -e ".[lint]"
    - name: Check formatting with ruff
      run: uv run ruff format --check .
    - name: Lint with ruff
      run: uv run ruff check .

  # -------------------------------------------------------------------
  # Type-check (mypy) — runs in parallel with lint
  # -------------------------------------------------------------------
  typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        python-version: "3.14"
        activate-environment: true
        enable-cache: "true"
        cache-dependency-glob: "pyproject.toml"
        cache-suffix: ${{ github.job }}
    - name: Install dependencies
      run: uv pip install -e ".[dev,lint]"
    - name: Run mypy
      run: uv run python -m mypy src/pyimgtag/ --ignore-missing-imports --disable-error-code import-untyped

  # -------------------------------------------------------------------
  # Pre-commit hooks (with env cache)
  # -------------------------------------------------------------------
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        python-version: "3.14"
        activate-environment: true
        enable-cache: "true"
        cache-dependency-glob: "pyproject.toml"
        cache-suffix: ${{ github.job }}
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/pre-commit
        key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
    - name: Install pre-commit
      run: uv pip install pre-commit
    - name: Run pre-commit on all files
      run: uv run pre-commit run --all-files

  # -------------------------------------------------------------------
  # Unit tests + Coverage (3 OSes, Python 3.14, all in parallel)
  # -------------------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14"]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        python-version: ${{ matrix.python-version }}
        activate-environment: true
        enable-cache: "true"
        cache-dependency-glob: "pyproject.toml"
        cache-suffix: ${{ github.job }}-${{ matrix.os }}-${{ matrix.python-version }}
    - name: Install dependencies
      run: uv pip install -e ".[dev,lint,review]"
    - name: Run tests
      shell: bash
      run: |
        uv run pytest \
          ${{ (matrix.os == 'ubuntu-latest') && '--cov' || '--no-cov -n0' }} \
          --junitxml=junit.xml -o junit_family=legacy
    - name: Upload coverage reports to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        report_type: test_results

  # -------------------------------------------------------------------
  # Security scanning (bandit + pip-audit in parallel via background jobs)
  # -------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      with:
        python-version: "3.14"
        activate-environment: true
        enable-cache: "true"
        cache-dependency-glob: "pyproject.toml"
        cache-suffix: ${{ github.job }}
    - name: Install dependencies
      run: uv pip install -e ".[security]"
    - name: Run bandit and pip-audit in parallel
      shell: bash
      run: |
        uv run python -m bandit -r src/pyimgtag/ -c pyproject.toml &
        BANDIT_PID=$!
        uv run python -m pip_audit &
        AUDIT_PID=$!
        wait $BANDIT_PID || { echo "bandit failed"; exit 1; }
        wait $AUDIT_PID  || { echo "pip-audit failed"; exit 1; }

  # -------------------------------------------------------------------
  # Docker image smoke test (with GHA layer cache)
  # -------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
    - name: Build Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
      with:
        context: .
        tags: pyimgtag:ci
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Smoke test --help
      run: docker run --rm pyimgtag:ci --help
    - name: Smoke test --version
      run: docker run --rm pyimgtag:ci --version
    - name: Smoke test status subcommand
      run: docker run --rm pyimgtag:ci status
    - name: Verify exiftool is on PATH inside image
      run: docker run --rm --entrypoint exiftool pyimgtag:ci -ver
