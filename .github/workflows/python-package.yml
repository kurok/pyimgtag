name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------
  # Quality: lint, format, type-check (one job — shared install)
  # -------------------------------------------------------------------
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv pip install -e ".[dev,lint]"
    - name: Check formatting with ruff
      run: uv run ruff format --check .
    - name: Lint with ruff
      run: uv run ruff check .
    - name: Run mypy
      run: uv run python -m mypy src/pyimgtag/ --ignore-missing-imports --disable-error-code import-untyped

  # -------------------------------------------------------------------
  # Pre-commit hooks
  # -------------------------------------------------------------------
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: "3.12"
    - name: Install pre-commit
      run: uv pip install pre-commit
    - name: Run pre-commit on all files
      run: uv run pre-commit run --all-files

  # -------------------------------------------------------------------
  # Unit tests + Coverage (multi-version, multi-OS matrix)
  # Coverage collected only on ubuntu-latest/3.12 to avoid overhead
  # -------------------------------------------------------------------
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        # Trim the matrix from 9 cells to 5. Removed cells:
        #   - macos-latest / 3.11
        #   - windows-latest / 3.11
        #   - windows-latest / 3.12
        # Linux still covers all three minors; macOS keeps 3.12 + 3.13
        # for the AppleScript / Photos-bridge stack; Windows keeps 3.13
        # which already exercised the Starlette TestClient socket path
        # that the older minors duplicated.
        exclude:
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.12"
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv pip install -e ".[dev,lint,review]"
    - name: Run tests
      shell: bash
      run: |
        uv run pytest \
          ${{ (matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12') && '--cov' || '--no-cov' }} \
          --junitxml=junit.xml -o junit_family=legacy
    - name: Upload coverage reports to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        report_type: test_results

  # -------------------------------------------------------------------
  # Security scanning
  # -------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: uv pip install -e ".[security]"
    - name: Run bandit (security linter)
      run: uv run python -m bandit -r src/pyimgtag/ -c pyproject.toml
    - name: Run pip-audit (dependency vulnerabilities)
      run: uv run python -m pip_audit

  # -------------------------------------------------------------------
  # Docker image smoke test
  # -------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Build Docker image
      run: docker build -t pyimgtag:ci .
    - name: Smoke test --help
      run: docker run --rm pyimgtag:ci --help
    - name: Smoke test --version
      run: docker run --rm pyimgtag:ci --version
    - name: Smoke test status subcommand
      run: docker run --rm pyimgtag:ci status
    - name: Verify exiftool is on PATH inside image
      run: docker run --rm --entrypoint exiftool pyimgtag:ci -ver
