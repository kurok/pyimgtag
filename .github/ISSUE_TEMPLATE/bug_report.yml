name: Bug Report
description: Report a bug in pyimgtag
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pyimgtag Version
      description: Output of `pyimgtag --version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: macOS Version
      description: Output of `sw_vers`
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python Version
      description: Output of `python --version`
    validations:
      required: true
