[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyimgtag"
version = "0.12.0"
description = "Tag macOS Photos library images using local Gemma model for searchable tags"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{ name = "pyimgtag contributors" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Graphics",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Operating System :: MacOS",
    "Intended Audience :: End Users/Desktop",
]
dependencies = [
    "requests>=2.28",
    "Pillow>=10.0",
    "imagehash>=4.3.1",
    "exifread>=3.0",
]

[project.optional-dependencies]
heic = ["pillow-heif>=0.10.0"]
photos = ["photoscript>=0.5.3"]
# face_recognition_models is a runtime dependency of face-recognition that is
# NOT published to PyPI — it only exists at the upstream git URL below. It must
# stay in this extras list (and out of the wheel's runtime install_requires)
# because PyPI rejects published packages that declare direct-URL dependencies
# in their core metadata. Direct URLs are tolerated for source / editable
# installs from extras, which is exactly the install path we want for users
# opting into face features. Do not "tidy up" the URL into a normal version
# pin — there is no PyPI release to pin against.
face = [
    "face-recognition>=1.3",
    "face_recognition_models @ git+https://github.com/ageitgey/face_recognition_models",
    # face_recognition_models does ``from pkg_resources import …`` at
    # import time. ``pkg_resources`` ships with setuptools, which is no
    # longer bundled by default in Python 3.12+ — pin it here so a fresh
    # ``pip install '.[face]'`` doesn't trip on a missing pkg_resources.
    "setuptools>=68.0",
    "scikit-learn>=1.3",
]
review = ["fastapi>=0.100", "uvicorn>=0.20", "pydantic>=2.0", "httpx>=0.24"]
raw = ["rawpy>=0.18"]
all = [
    "pillow-heif>=0.10.0",
    "photoscript>=0.5.3",
    "face-recognition>=1.3",
    # See note above on the [face] extra: this direct URL must stay in extras.
    "face_recognition_models @ git+https://github.com/ageitgey/face_recognition_models",
    # See note in [face]: needed for face_recognition_models' pkg_resources import.
    "setuptools>=68.0",
    "scikit-learn>=1.3",
    "fastapi>=0.100",
    "uvicorn>=0.20",
    "pydantic>=2.0",
    "httpx>=0.24",
    "rawpy>=0.18",
]
dev = ["pytest>=9.0", "pytest-xdist>=3.0", "pytest-cov>=4.0"]
lint = ["mypy>=1.0", "ruff>=0.1.0"]
security = ["bandit>=1.7", "pip-audit>=2.6"]
# Optional: install Playwright + Pillow for the local screenshot smoke
# under tests/local/. After `pip install '.[screenshot]'` run
# `playwright install chromium` once to fetch the browser binary.
screenshot = ["playwright>=1.40", "Pillow>=10.0"]
# End-to-end Playwright smoke (tests/e2e/) used by both the local
# `scripts/test-smoke-local.sh` runner and the `pr-tests` GH workflow.
# After `pip install '.[e2e]'` run `playwright install chromium` once.
e2e = [
    "playwright>=1.40",
    "pytest-playwright>=0.4",
    "requests>=2.31",
]

[project.scripts]
pyimgtag = "pyimgtag.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# Two test directories are kept out of the default run:
# - tests/local/ — Playwright screenshot smoke; writes PNGs locally.
# - tests/e2e/   — Playwright smoke that needs the dashboard already
#                  running (started by scripts/test-smoke-local.sh
#                  locally or .github/workflows/pr-tests.yml in CI).
# Invoke either explicitly with `--override-ini='addopts='`.
addopts = "-n auto --dist=worksteal --ignore=tests/local --ignore=tests/e2e"

[tool.coverage.run]
branch = false
source = ["src/pyimgtag"]

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false

[tool.bandit]
skips = ["B404", "B603", "B607"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"src/pyimgtag/review_server.py" = ["E501"]  # HTML/CSS template has long lines
"src/pyimgtag/faces_review_server.py" = ["E501"]
"src/pyimgtag/webapp/routes_review.py" = ["E501"]  # HTML/CSS template has long lines
"src/pyimgtag/webapp/routes_faces.py" = ["E501"]  # HTML/CSS template has long lines
