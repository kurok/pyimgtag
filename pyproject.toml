[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyimgtag"
version = "0.2.0"
description = "Tag macOS Photos library images using local Gemma model for searchable tags"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{ name = "pyimgtag contributors" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Graphics",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Operating System :: MacOS",
    "Intended Audience :: End Users/Desktop",
]
dependencies = [
    "requests>=2.28",
    "Pillow>=10.0",
    "imagehash>=4.3.1",
    "exifread>=3.0",
]

[project.optional-dependencies]
heic = ["pillow-heif>=0.10.0"]
photos = ["photoscript>=0.5.3"]
face = ["face-recognition>=1.3", "scikit-learn>=1.3"]
review = ["fastapi>=0.100", "uvicorn>=0.20", "pydantic>=2.0"]
raw = ["rawpy>=0.18"]
all = ["pillow-heif>=0.10.0", "photoscript>=0.5.3", "rawpy>=0.18"]
dev = ["pytest>=9.0", "pytest-xdist>=3.0", "pytest-cov>=4.0"]
lint = ["mypy>=1.0", "ruff>=0.1.0"]
security = ["bandit>=1.7", "pip-audit>=2.6"]

[project.scripts]
pyimgtag = "pyimgtag.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-n auto --dist=worksteal"

[tool.coverage.run]
branch = false
source = ["src/pyimgtag"]

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false

[tool.bandit]
skips = ["B404", "B603", "B607"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"src/pyimgtag/review_server.py" = ["E501"]  # HTML/CSS template has long lines
