[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pyimgtag"
version = "0.11.2"
description = "Tag macOS Photos library images using local Gemma model for searchable tags"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{ name = "pyimgtag contributors" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Graphics",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Operating System :: MacOS",
    "Intended Audience :: End Users/Desktop",
]
dependencies = [
    "requests>=2.28",
    "Pillow>=10.0",
    "imagehash>=4.3.1",
    "exifread>=3.0",
]

[project.optional-dependencies]
heic = ["pillow-heif>=0.10.0"]
photos = ["photoscript>=0.5.3"]
face = ["face-recognition>=1.3", "scikit-learn>=1.3"]
review = ["fastapi>=0.100", "uvicorn>=0.20", "pydantic>=2.0", "httpx>=0.24"]
raw = ["rawpy>=0.18"]
all = [
    "pillow-heif>=0.10.0",
    "photoscript>=0.5.3",
    "face-recognition>=1.3",
    "scikit-learn>=1.3",
    "fastapi>=0.100",
    "uvicorn>=0.20",
    "pydantic>=2.0",
    "httpx>=0.24",
    "rawpy>=0.18",
]
dev = ["pytest>=9.0", "pytest-xdist>=3.0", "pytest-cov>=4.0"]
lint = ["mypy>=1.0", "ruff>=0.1.0"]
security = ["bandit>=1.7", "pip-audit>=2.6"]
# Optional: install Playwright + Pillow for the local screenshot smoke
# under tests/local/. After `pip install '.[screenshot]'` run
# `playwright install chromium` once to fetch the browser binary.
screenshot = ["playwright>=1.40", "Pillow>=10.0"]

[project.scripts]
pyimgtag = "pyimgtag.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# `tests/local/` holds the Playwright screenshot smoke; it boots a real
# uvicorn server, opens a sandboxed Chromium, and writes PNGs. Excluded
# from the default run (and from CI) — invoke it explicitly with
# `pytest tests/local/ --override-ini='addopts='`.
addopts = "-n auto --dist=worksteal --ignore=tests/local"

[tool.coverage.run]
branch = false
source = ["src/pyimgtag"]

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false

[tool.bandit]
skips = ["B404", "B603", "B607"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
"src/pyimgtag/review_server.py" = ["E501"]  # HTML/CSS template has long lines
"src/pyimgtag/faces_review_server.py" = ["E501"]
"src/pyimgtag/webapp/routes_review.py" = ["E501"]  # HTML/CSS template has long lines
"src/pyimgtag/webapp/routes_faces.py" = ["E501"]  # HTML/CSS template has long lines
