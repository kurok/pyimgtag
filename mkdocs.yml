site_name: pyimgtag
site_url: https://kurok.github.io/pyimgtag/
site_description: Tag images using a local Gemma model with EXIF GPS reverse geocoding.
repo_name: kurok/pyimgtag
repo_url: https://github.com/kurok/pyimgtag

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ['.']
  - tables
  - admonition

nav:
  - Home: index.md
  - Platform Setup: platform-setup.md
  - Changelog: changelog.md
  - Contributing: contributing.md
  - Security: security.md

# docs/ pages are thin wrappers that include root-level markdown files via
# pymdownx.snippets (--8<-- "README.md" etc.). Those root files contain
# cross-references like [CONTRIBUTING.md](CONTRIBUTING.md) which are valid
# relative links on GitHub but resolve to absent paths under docs/. Suppress
# the resulting "not found" link warnings so CI stays clean.
validation:
  links:
    not_found: ignore
